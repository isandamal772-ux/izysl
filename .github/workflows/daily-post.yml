name: Daily Travel Autopost

on:
  schedule:
    # Runs at 00:00 UTC every day (approx 05:30 AM Sri Lanka Time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual execution from the GitHub Actions tab

jobs:
  autopost:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Daily Article Generator
        run: npx tsx scripts/generate-daily-blogs.ts

      - name: Rebuild Static Sitemap
        run: npm run build

      - name: Commit and Push Daily Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/dynamicBlogs.json src/data/dynamicTips.json public/sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate daily articles & sitemap [skip ci]" && git push)
